<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的精简闹钟</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 300px;
        }
        #current-time {
            font-size: 3.5rem;
            font-weight: bold;
            color: #007AFF;
            margin-bottom: 20px;
        }
        input[type="time"] {
            font-size: 2rem;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .set-btn { background: #34c759; color: white; }
        .stop-btn { background: #ff3b30; color: white; }
        #status { margin-top: 15px; color: #666; font-size: 0.9rem; }
        .ringing { animation: flash 1s infinite; }
        @keyframes flash { 50% { background: #ffebeb; } }
    </style>
</head>
<body>

<div class="container" id="card">
    <div id="current-time">00:00:00</div>
    <input type="time" id="alarm-time" value="00:00">
    <div class="btn-group">
        <button class="set-btn" onclick="startAlarm()">设定闹钟</button>
        <button class="stop-btn" onclick="cancelAlarm()">关闭闹钟</button>
    </div>
    <div id="status">等待设定...</div>
</div>

<audio id="beep-sound" loop>
    <source src="https://assets.piliapp.com/s3pxy/timer/beep2.mp3" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('beep-sound');
    let alarmTime = null;
    let isRinging = false;
    let autoStopTimer = null;

    function update() {
        const now = new Date();
        const timeStr = now.toTimeString().split(' ')[0];
        document.getElementById('current-time').textContent = timeStr;
        
        const nowShort = timeStr.substring(0, 5);
        if (alarmTime === nowShort && !isRinging) {
            isRinging = true;
            audio.play();
            document.getElementById('card').classList.add('ringing');
            document.getElementById('status').textContent = "⏰ 响铃中 (1分钟后自动停止)";
            
            // 1分钟自动停止
            autoStopTimer = setTimeout(cancelAlarm, 60000);
        }
    }

    function startAlarm() {
        alarmTime = document.getElementById('alarm-time').value;
        document.getElementById('status').textContent = "✅ 已设定: " + alarmTime;
        // 解锁音频
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; });
    }

    function cancelAlarm() {
        if (autoStopTimer) clearTimeout(autoStopTimer);
        alarmTime = null;
        isRinging = false;
        audio.pause();
        audio.currentTime = 0;
        document.getElementById('card').classList.remove('ringing');
        document.getElementById('status').textContent = "已关闭 (时间已保留)";
    }

    setInterval(update, 1000);
</script>
</body>
</html>
